name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # 또는 master 등 기본 브랜치 이름에 맞춰 수정

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
