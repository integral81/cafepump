<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카공 명당 큐레이션 관리자</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: 'Pretendard', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
        }
        aside {
            width: 300px;
            background: var(--card);
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
        }
        .aside-header {
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
        }
        .cafe-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .cafe-item {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .cafe-item:hover {
            background: #f1f5f9;
        }
        .cafe-item.active {
            background: var(--primary);
            color: white;
        }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            padding: 20px 40px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .content {
            padding: 40px;
            overflow-y: auto;
        }
        .search-area {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #f1f5f9;
            padding: 20px;
            border-radius: 12px;
        }
        .search-row {
            display: flex;
            gap: 10px;
        }
        .manual-area {
            display: flex;
            gap: 10px;
            padding-top: 15px;
            border-top: 1px dashed #cbd5e1;
            align-items: center;
        }
        .manual-area label {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
        }
        .btn-secondary {
            background: #64748b;
        }
        .btn-accent {
            background: #f59e0b;
        }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        /* ... 기존 스타일 유지 */
    </style>
</head>
<body>
    <aside>
        <div class="aside-header">
            <h3>☕ 카페 목록</h3>
        </div>
        <div class="cafe-list" id="cafe-list">
            <!-- JS로 로드 -->
        </div>
    </aside>
    <main>
        <header>
            <h2 id="current-cafe-name">카페를 선택해주세요</h2>
            <div id="cafe-stats">
                <button id="delete-all-btn" class="btn-accent" style="display: none; padding: 6px 12px; font-size: 13px;">⚠️ 모든 사진 삭제</button>
            </div>
        </header>
        <div class="content">
            <div class="search-area">
                <div class="search-row">
                    <input type="text" id="search-query" placeholder="검색어를 입력하세요">
                    <button id="search-btn">구글 지도 검색</button>
                    <button id="google-web-btn" class="btn-secondary">🌐 구글 이미지 새창열기</button>
                </div>
                
                <div class="manual-area">
                    <label>📸 사진 관리:</label>
                    <button id="camera-btn" class="btn-accent">📸 휴대폰 사진 촬영/업로드</button>
                    <input type="file" id="camera-input" accept="image/*" style="display: none;">
                </div>
                
                <div class="manual-area" style="margin-top: 10px; border-top: none; padding-top: 0;">
                    <label>🔗 URL 등록:</label>
                    <input type="text" id="manual-url" placeholder="이미지 주소 붙여넣기">
                    <button id="add-manual-btn" class="btn-secondary">추가</button>
                </div>
            </div>
            <div class="photo-grid" id="photo-grid">
                <!-- 검색 결과 보임 -->
            </div>
        </div>
    </main>

    <script type="module" src="./curation.js"></script>
</body>
</html>
